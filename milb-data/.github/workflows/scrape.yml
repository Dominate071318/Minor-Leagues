name: MiLB Data Refresh

on:
  schedule:
    # ── IN-SEASON: every 5 minutes noon–midnight PT (7pm–7am UTC) ─────────────
    # April through October
    - cron: "*/5 19-23 * 4-10 *"   # 7pm–midnight UTC = noon–5pm PT
    - cron: "*/5 0-7  * 4-10 *"    # midnight–7am UTC = 5pm–midnight PT

    # ── DAILY CLEANUP: 8am UTC (1am PT) every day ─────────────────────────────
    - cron: "0 8 * * *"

  workflow_dispatch:               # manual trigger from GitHub UI anytime
    inputs:
      season:
        description: "Season year (default: current)"
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ hashFiles('R/packages.R') }}
          restore-keys: r-pkgs-

      - name: Install R packages
        run: Rscript R/packages.R

      - name: Check if games are live right now
        id: games_check
        run: |
          Rscript -e "
            library(jsonlite)
            today <- format(Sys.Date(), '%Y-%m-%d')
            url <- paste0('https://statsapi.mlb.com/api/v1/schedule?sportId=11,12,13,14,16&date=', today, '&gameType=R')
            res <- tryCatch(fromJSON(url, flatten=TRUE), error=function(e) NULL)
            games <- if (!is.null(res) && length(res\$dates) > 0) bind_rows(res\$dates\$games) else data.frame()
            live <- if (nrow(games) > 0) any(games\$status.detailedState %in% c('In Progress','Warmup','Pre-Game'), na.rm=TRUE) else FALSE
            cat(paste0('games_live=', tolower(live), '\n'), file=Sys.getenv('GITHUB_OUTPUT'), append=TRUE)
            cat('Games live right now:', live, '\n')
            cat('Total games today:', nrow(games), '\n')
          "

      - name: Run LIVE scraper (fast — API only, no B-Ref)
        if: steps.games_check.outputs.games_live == 'true'
        env:
          SEASON: ${{ github.event.inputs.season }}
          SCRAPE_MODE: "live"
        run: Rscript R/scrape.R

      - name: Run FULL scraper (all sources including B-Ref, FanGraphs)
        if: steps.games_check.outputs.games_live == 'false'
        env:
          SEASON: ${{ github.event.inputs.season }}
          SCRAPE_MODE: "full"
        run: Rscript R/scrape.R

      - name: Process data
        run: Rscript R/process.R

      - name: Build site JSON
        run: Rscript R/build_site_data.R

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "data: refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

  deploy-site:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
