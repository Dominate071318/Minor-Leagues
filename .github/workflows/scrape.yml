
name: MiLB Data Refresh

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      season:
        description: "Season year"
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"
          use-public-rspm: true
      - name: Install R packages
        run: Rscript R/packages.R
      - name: Run scraper
        env:
          SEASON: ${{ github.event.inputs.season }}
          SCRAPE_MODE: full
        run: Rscript R/scrape.R
      - name: Process data
        run: Rscript R/process.R
      - name: Build site JSON
        run: Rscript R/build_site_data.R
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "data refresh"
          git push

  deploy-site:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - id: deployment
        uses: actions/deploy-pages@v4

